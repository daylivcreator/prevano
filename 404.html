<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page introuvable · Prevano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="robots" content="noindex">
<meta property="og:type" content="website">
<meta property="og:url" content="https://prevano.fr/">
<meta property="og:title" content="Page introuvable — Prevano">
<meta property="og:description" content="Cette page n'existe pas. Retourne au simulateur de retraite.">
<meta property="og:image" content="https://prevano.fr/og.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://prevano.fr/og.png">
<script defer data-domain="prevano.fr" src="https://plausible.io/js/script.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --color-primary:#E24B4A;
  --color-primary-dark:#A32D2D;
  --color-primary-subtle:rgba(226,75,74,0.12);
  --color-primary-border:rgba(226,75,74,0.25);
  --grad-brand:linear-gradient(135deg,#E24B4A 0%,#FF7B35 100%);
  --grad-text:linear-gradient(135deg,#E24B4A 0%,#FF8C72 55%,#FFB347 100%);
  --bg-base:#0C0C0B;
  --bg-surface:#141413;
  --bg-raised:#1C1C1A;
  --text-primary:#F5F4F0;
  --text-muted:#A8A79F;
  --text-faint:#5F5E5A;
  --border-subtle:rgba(255,255,255,0.07);
  --border-default:rgba(255,255,255,0.12);
}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg-base);
  color:var(--text-primary);
  font-size:15px;
  line-height:1.6;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  text-align:center;
}
.error-code{
  font-size:120px;
  font-weight:900;
  letter-spacing:-0.06em;
  line-height:1;
  background:var(--grad-text);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 40px rgba(226,75,74,0.3));
  margin-bottom:24px;
}
h1{
  font-size:28px;
  font-weight:700;
  letter-spacing:-0.03em;
  margin-bottom:12px;
}
.sub{
  font-size:16px;
  color:var(--text-muted);
  max-width:400px;
  margin:0 auto 40px;
  line-height:1.65;
}
.btn-home{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--color-primary);
  color:#fff;
  text-decoration:none;
  padding:14px 28px;
  border-radius:10px;
  font-size:15px;
  font-weight:700;
  transition:background-color 0.2s,transform 0.2s;
  letter-spacing:0.01em;
}
.btn-home:hover{
  background:var(--color-primary-dark);
  transform:translateY(-2px);
}
@media(max-width:480px){
  .error-code{font-size:80px;}
  h1{font-size:22px;}
}
</style>
</head>
<body>
  <div class="error-code" aria-hidden="true">404</div>
  <h1>Cette page n'existe pas.</h1>
  <p class="sub">Tu t'es perdu ? Pas de panique, ton futur financier t'attend.</p>
  <a href="/" class="btn-home">← Retour à l'accueil</a>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="/gsap-animations.js"></script>
</body>
</html>
