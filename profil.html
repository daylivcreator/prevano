<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
input,button{font-family:inherit;font-size:inherit;}
:root{
  --color-primary:#E24B4A;--color-primary-dark:#A32D2D;
  --color-primary-subtle:rgba(226,75,74,0.12);--color-primary-border:rgba(226,75,74,0.25);
  --grad-brand:linear-gradient(135deg,#E24B4A 0%,#FF7B35 100%);
  --bg-base:#0C0C0B;--bg-surface:#141413;--bg-raised:#1C1C1A;--bg-overlay:#242422;
  --text-primary:#F5F4F0;--text-muted:#A8A79F;--text-faint:#5F5E5A;
  --border-subtle:rgba(255,255,255,0.07);--border-default:rgba(255,255,255,0.12);
}
body{font-family:'Inter',sans-serif;background:var(--bg-base);color:var(--text-primary);font-size:15px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;}
nav{border-bottom:1px solid var(--border-subtle);padding:0 48px;background:rgba(12,12,11,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:1100px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-icon{width:34px;height:34px;background:var(--grad-brand);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo{font-size:18px;font-weight:900;letter-spacing:-0.05em;background:var(--grad-brand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo em{font-style:normal;}
.nav-links{display:flex;align-items:center;gap:14px;}
.nav-link{font-size:14px;color:var(--text-muted);text-decoration:none;transition:color 0.2s;}
.nav-link:hover{color:var(--text-primary);}
.btn-nav{background:transparent;color:var(--text-muted);border:1px solid var(--border-default);padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-nav:hover{border-color:var(--color-primary);color:var(--color-primary);}
/* Main */
main{flex:1;padding:48px 48px 80px;max-width:1100px;margin:0 auto;width:100%;}
.page-title{font-size:28px;font-weight:900;letter-spacing:-0.04em;margin-bottom:8px;}
.page-sub{font-size:14px;color:var(--text-muted);margin-bottom:40px;}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
/* Tools card */
.tools-card{grid-column:1/-1;}
.tools-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:4px;}
.tool-link{background:var(--bg-raised);border:1px solid var(--border-subtle);border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:14px;text-decoration:none;transition:border-color .2s,background .2s;color:var(--text-primary);}
.tool-link:hover{border-color:var(--color-primary-border);background:var(--color-primary-subtle);}
.tool-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tool-icon i{font-size:20px;color:#fff;}
.tool-icon-budget{background:linear-gradient(135deg,#2563EB,#60A5FA);}
.tool-icon-invest{background:linear-gradient(135deg,#059669,#34D399);}
.tool-icon-coach{background:linear-gradient(135deg,#7C3AED,#A78BFA);}
.tool-icon-daily{background:linear-gradient(135deg,#EA580C,#FB923C);}
.tool-body{flex:1;min-width:0;}
.tool-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.tool-desc{font-size:12px;color:var(--text-muted);}
.tool-arrow{font-size:16px;color:var(--text-faint);transition:transform .2s;}
.tool-link:hover .tool-arrow{transform:translateX(3px);color:var(--color-primary);}
.tool-locked{opacity:0.55;cursor:default;pointer-events:none;}
.lock-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;background:var(--color-primary-subtle);color:var(--color-primary);letter-spacing:0.04em;margin-left:6px;vertical-align:middle;}
/* Dashboard score card */
.score-dash{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.score-dash-ring{position:relative;width:64px;height:64px;flex-shrink:0;}
.score-dash-ring svg{width:64px;height:64px;}
.score-dash-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;}
.score-dash-info{flex:1;min-width:0;}
.score-dash-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint);margin-bottom:4px;}
.score-dash-tier{font-size:14px;font-weight:700;}
.score-dash-date{font-size:12px;color:var(--text-muted);margin-top:2px;}
.upgrade-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg-raised);border:1px solid var(--border-subtle);border-radius:12px;padding:16px 20px;gap:12px;}
.upgrade-text{font-size:13px;color:var(--text-muted);}
.upgrade-text strong{color:var(--text-primary);}
@media(max-width:700px){.tools-grid{grid-template-columns:1fr;}}
/* Cards */
.card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:16px;padding:28px;}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint);margin-bottom:20px;}
.info-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-subtle);}
.info-row:last-child{border-bottom:none;}
.info-label{font-size:13px;color:var(--text-muted);}
.info-value{font-size:13px;font-weight:600;}
/* Plan badge */
.plan-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:700;letter-spacing:0.04em;}
.plan-free   {background:var(--bg-overlay);color:var(--text-muted);}
.plan-starter{background:rgba(96,165,250,0.15);color:#60A5FA;}
.plan-pro    {background:rgba(167,139,250,0.15);color:#A78BFA;}
.plan-premium{background:var(--color-primary-subtle);color:var(--color-primary);}
/* Status badge */
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;}
.status-active {color:#22C55E;}
.status-past_due{color:#FFB400;}
.status-canceled{color:var(--color-primary);}
/* Buttons */
.btn-primary{background:var(--color-primary);color:#fff;border:none;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:background-color 0.2s,transform 0.2s;display:inline-flex;align-items:center;gap:8px;margin-top:4px;}
.btn-primary:hover{background:var(--color-primary-dark);transform:translateY(-1px);}
.btn-secondary{background:transparent;color:var(--text-muted);border:1px solid var(--border-default);padding:11px 22px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;margin-top:4px;}
.btn-secondary:hover{border-color:var(--color-primary);color:var(--color-primary);}
.btn-danger{background:transparent;color:var(--color-primary);border:1px solid var(--color-primary-border);padding:11px 22px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;margin-top:4px;}
.btn-danger:hover{background:var(--color-primary-subtle);}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
/* Success banner */
.success-banner{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:12px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:10px;font-size:14px;color:#22C55E;}
/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--bg-raised) 25%,var(--bg-overlay) 50%,var(--bg-raised) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;height:14px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Onboarding modal */
.onboard-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);}
.onboard-modal{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:20px;max-width:480px;width:100%;padding:40px 36px;text-align:center;}
.onboard-steps{display:flex;flex-direction:column;gap:14px;margin:24px 0;text-align:left;}
.onboard-step{display:flex;align-items:flex-start;gap:14px;background:var(--bg-raised);border-radius:12px;padding:14px 16px;}
.onboard-step-num{width:28px;height:28px;background:var(--color-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.onboard-step-body{flex:1;}
.onboard-step-title{font-size:13px;font-weight:700;margin-bottom:2px;}
.onboard-step-desc{font-size:12px;color:var(--text-muted);}
/* Footer */
footer{border-top:1px solid var(--border-subtle);padding:20px 48px;}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.footer-links{display:flex;gap:20px;}
.footer-link{font-size:12px;color:var(--text-faint);text-decoration:none;}
.footer-link:hover{color:var(--text-muted);}
.footer-copy{font-size:12px;color:var(--text-faint);}
@keyframes spin{to{transform:rotate(360deg);}}
/* Motion design */
@keyframes cardIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
.profile-grid.rendered .card{animation:cardIn .5s cubic-bezier(.25,.8,.25,1) both;}
.profile-grid.rendered .card:nth-child(1){animation-delay:.0s;}
.profile-grid.rendered .card:nth-child(2){animation-delay:.1s;}
.profile-grid.rendered .card:nth-child(3){animation-delay:.2s;}
.profile-grid.rendered .card:nth-child(4){animation-delay:.3s;}
.profile-grid.rendered .card:nth-child(5){animation-delay:.4s;}
.card{transition:border-color .2s,transform .2s,box-shadow .2s;}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3);}
@keyframes pageIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.page-header{animation:pageIn .5s cubic-bezier(.25,.8,.25,1) both;}
@media(prefers-reduced-motion:reduce){.card,.profile-grid.rendered .card,.page-header{animation:none;opacity:1;transform:none;transition:none;}}
@media(max-width:700px){
  nav,.main-wrap{padding-left:20px;padding-right:20px;}
  main{padding:32px 20px 60px;}
  .profile-grid{grid-template-columns:1fr;}
  .btn-row{flex-direction:column;}
  .tools-card{grid-column:1;}
}
</style>

<script>
'use strict';

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const PLAN_LABELS = { free:'Gratuit', starter:'Starter', pro:'Coach Pro', premium:'Daily Finance' };
const SUB_LABELS  = { active:'Actif', past_due:'Paiement en attente', canceled:'Annulé', trialing:'Période d\'essai' };

function planBadge(plan) {
  return `<span class="plan-badge plan-${plan}"><i class="ti ti-${plan==='free'?'star':'bolt'}" aria-hidden="true"></i>${PLAN_LABELS[plan] ?? plan}</span>`;
}

function statusBadge(status) {
  if (!status) return '<span class="status-badge" style="color:var(--text-faint)">—</span>';
  const cls = ['active','trialing'].includes(status) ? 'status-active' : status === 'past_due' ? 'status-past_due' : 'status-canceled';
  const icon = status === 'active' ? 'ti-circle-check' : status === 'past_due' ? 'ti-alert-circle' : 'ti-circle-x';
  return `<span class="status-badge ${cls}"><i class="ti ${icon}" aria-hidden="true"></i>${SUB_LABELS[status] ?? status}</span>`;
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
}

function buildToolsCard(plan) {
  const PAID  = new Set(['starter','pro','premium']);
  const PRO   = new Set(['pro','premium']);
  const PREM  = plan === 'premium';

  if (!PAID.has(plan)) {
    return `
      <div class="card tools-card">
        <div class="card-title">Mes outils</div>
        <div class="tools-grid">
          <div class="tool-link tool-locked">
            <div class="tool-icon tool-icon-budget"><i class="ti ti-calculator" aria-hidden="true"></i></div>
            <div class="tool-body">
              <div class="tool-name">Calculateur Budget <span class="lock-badge">Starter</span></div>
              <div class="tool-desc">Plan d'optimisation IA en 5 actions</div>
            </div>
            <i class="ti ti-lock tool-arrow" aria-hidden="true"></i>
          </div>
          <div class="tool-link tool-locked">
            <div class="tool-icon tool-icon-coach"><i class="ti ti-robot" aria-hidden="true"></i></div>
            <div class="tool-body">
              <div class="tool-name">Coach IA <span class="lock-badge">Coach Pro</span></div>
              <div class="tool-desc">Conseils PEA, AV, PER personnalisés</div>
            </div>
            <i class="ti ti-lock tool-arrow" aria-hidden="true"></i>
          </div>
          <div class="tool-link tool-locked">
            <div class="tool-icon tool-icon-daily"><i class="ti ti-book-open" aria-hidden="true"></i></div>
            <div class="tool-body">
              <div class="tool-name">Leçon du jour <span class="lock-badge">Daily Finance</span></div>
              <div class="tool-desc">5 min/jour, streak et badges</div>
            </div>
            <i class="ti ti-lock tool-arrow" aria-hidden="true"></i>
          </div>
        </div>
        <div class="upgrade-row" style="margin-top:16px">
          <span class="upgrade-text"><strong>Débloquez vos outils</strong> — à partir de 9,99€/mois, sans engagement.</span>
          <a href="/tarifs.html" class="btn-primary" style="white-space:nowrap;text-decoration:none;width:auto;">
            <i class="ti ti-bolt" aria-hidden="true"></i> Voir les offres
          </a>
        </div>
      </div>`;
  }

  const tools = [];

  tools.push(`
    <a href="/budget.html" class="tool-link">
      <div class="tool-icon tool-icon-budget"><i class="ti ti-calculator" aria-hidden="true"></i></div>
      <div class="tool-body">
        <div class="tool-name">Calculateur Budget</div>
        <div class="tool-desc">Plan d'optimisation IA en 5 actions</div>
      </div>
      <i class="ti ti-arrow-right tool-arrow" aria-hidden="true"></i>
    </a>
    <a href="/calculateur.html" class="tool-link">
      <div class="tool-icon tool-icon-invest"><i class="ti ti-trending-up" aria-hidden="true"></i></div>
      <div class="tool-body">
        <div class="tool-name">Calculateur PEA · PER · AV</div>
        <div class="tool-desc">Stratégie d'investissement optimale</div>
      </div>
      <i class="ti ti-arrow-right tool-arrow" aria-hidden="true"></i>
    </a>`);

  if (PRO.has(plan)) {
    tools.push(`
      <a href="/coach.html" class="tool-link">
        <div class="tool-icon tool-icon-coach"><i class="ti ti-robot" aria-hidden="true"></i></div>
        <div class="tool-body">
          <div class="tool-name">Coach IA</div>
          <div class="tool-desc">Conseils investissement & retraite</div>
        </div>
        <i class="ti ti-arrow-right tool-arrow" aria-hidden="true"></i>
      </a>`);
  }

  if (PREM) {
    tools.push(`
      <a href="/daily.html" class="tool-link">
        <div class="tool-icon tool-icon-daily"><i class="ti ti-book-open" aria-hidden="true"></i></div>
        <div class="tool-body">
          <div class="tool-name">Leçon du jour</div>
          <div class="tool-desc">5 min/jour pour maîtriser tes finances</div>
        </div>
        <i class="ti ti-arrow-right tool-arrow" aria-hidden="true"></i>
      </a>`);
  }

  const upgradeHint = plan === 'starter'
    ? `<a href="/tarifs.html" class="btn-secondary" style="text-decoration:none;font-size:13px;"><i class="ti ti-bolt" aria-hidden="true"></i> Débloquer Coach IA</a>`
    : plan === 'pro'
    ? `<a href="/tarifs.html" class="btn-secondary" style="text-decoration:none;font-size:13px;"><i class="ti ti-flame" aria-hidden="true"></i> Débloquer Daily Finance</a>`
    : '';

  return `
    <div class="card tools-card">
      <div class="card-title">Mes outils</div>
      <div class="tools-grid">${tools.join('')}</div>
      ${upgradeHint ? `<div class="btn-row" style="margin-top:16px">${upgradeHint}</div>` : ''}
    </div>`;
}

function buildScoreDashCard() {
  try {
    const saved = JSON.parse(localStorage.getItem('prv_last_sim') || 'null');
    if (!saved || !saved.age) return '';
    const TIERS = [
      { t:26, color:'#E24B4A', label:'🔴 Situation critique' },
      { t:51, color:'#CD7F32', label:'🥉 Bronze' },
      { t:71, color:'#B0B0C8', label:'🥈 Argent' },
      { t:91, color:'#FFB400', label:'🥇 Or' },
      { t:Infinity, color:'#22C55E', label:'💎 Platine' },
    ];
    const RATE = { prive:{ base:.35,extra:.15,fy:43 }, fonctionnaire:{ base:.55,extra:.20,fy:41.5 }, independant:{ base:.25,extra:.10,fy:43 } };
    const r    = RATE[saved.statut] ?? RATE.prive;
    const ann  = (saved.dep||64) - (saved.age||40);
    const pension = Math.round((saved.sal||0) * (r.base + Math.min(ann/r.fy,1)*r.extra));
    let score = 0;
    score += Math.round((pension/(saved.sal||1))*40);
    score += Math.min(Math.round(((saved.ep||0)/(saved.sal||1))*150),20);
    score += Math.min(Math.round((ann/r.fy)*25),25);
    score += { prive:5, fonctionnaire:15, independant:0 }[saved.statut] ?? 5;
    score  = Math.min(Math.max(score,5),100);
    const tier = TIERS.find(t => score < t.t);
    const circ = 2*Math.PI*26;
    const offset = (circ - (score/100)*circ).toFixed(1);
    const date = saved.date ? new Date(saved.date).toLocaleDateString('fr-FR',{day:'numeric',month:'long'}) : '';
    return `
      <div class="card" style="grid-column:1/-1">
        <div class="card-title">Ma dernière simulation</div>
        <div class="score-dash">
          <div class="score-dash-ring">
            <svg viewBox="0 0 64 64" aria-hidden="true">
              <circle cx="32" cy="32" r="26" fill="none" stroke="var(--bg-overlay)" stroke-width="6"/>
              <circle cx="32" cy="32" r="26" fill="none" stroke="${tier.color}" stroke-width="6"
                stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset}"
                stroke-linecap="round" transform="rotate(-90 32 32)"/>
            </svg>
            <div class="score-dash-num" style="color:${tier.color}">${score}</div>
          </div>
          <div class="score-dash-info">
            <div class="score-dash-label">Score retraite</div>
            <div class="score-dash-tier">${tier.label}</div>
            <div class="score-dash-date">${date ? `Simulé le ${date}` : ''} · ${saved.statut ?? ''} · ${saved.sal ? saved.sal.toLocaleString('fr-FR')+'€/mois' : ''}</div>
          </div>
          <a href="/" class="btn-secondary" style="text-decoration:none;font-size:13px;">
            <i class="ti ti-refresh" aria-hidden="true"></i> Resimul­er
          </a>
        </div>
        <div id="sim-history">${buildHistoryHtml()}</div>
      </div>`;
  } catch { return ''; }
}

function buildHistoryHtml() {
  try {
    const hist = JSON.parse(localStorage.getItem('prv_sim_history') || '[]');
    if (hist.length < 2) return ''; // Pas assez d'historique à montrer
    const TIERS = [{t:26,c:'#E24B4A',l:'Critique'},{t:51,c:'#CD7F32',l:'Bronze'},{t:71,c:'#B0B0C8',l:'Argent'},{t:91,c:'#FFB400',l:'Or'},{t:Infinity,c:'#22C55E',l:'Platine'}];
    const RATE  = {prive:{b:.35,e:.15,f:43},fonctionnaire:{b:.55,e:.20,f:41.5},independant:{b:.25,e:.10,f:43}};
    function calcScore(s) {
      const r=RATE[s.statut]??RATE.prive, ann=(s.dep||64)-s.age, p=Math.round(s.sal*(r.b+Math.min(ann/r.f,1)*r.e));
      let sc=Math.round((p/s.sal)*40)+Math.min(Math.round(((s.ep||0)/s.sal)*150),20)+Math.min(Math.round((ann/r.f)*25),25)+({prive:5,fonctionnaire:15,independant:0}[s.statut]??5);
      return Math.min(Math.max(sc,5),100);
    }
    const rows = hist.slice(0,6).map(s => {
      const sc=calcScore(s), tier=TIERS.find(t=>sc<t.t);
      const d=s.date?new Date(s.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'';
      return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border-subtle);">
        <div style="font-size:22px;font-weight:900;color:${tier.c};min-width:38px;text-align:right">${sc}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;color:${tier.c}">${tier.l}</div>
          <div style="font-size:11px;color:var(--text-faint)">${d} · ${s.sal?s.sal.toLocaleString('fr-FR')+'€':''}</div>
        </div>
      </div>`;
    }).join('');
    return `<div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border-subtle)">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin-bottom:12px">Historique</div>
      ${rows}
    </div>`;
  } catch { return ''; }
}

function renderProfile(user) {
  const grid = document.getElementById('profile-grid');
  const hasPaid = user.plan !== 'free';

  grid.innerHTML = `
    <div class="card">
      <div class="card-title">Informations du compte</div>
      <div class="info-row"><span class="info-label">Prénom</span><span class="info-value">${escHtml(user.firstName)}</span></div>
      <div class="info-row"><span class="info-label">Email</span><span class="info-value">${escHtml(user.email)}</span></div>
      <div class="info-row"><span class="info-label">Membre depuis</span><span class="info-value">${formatDate(user.createdAt)}</span></div>
      <div class="btn-row">
        <a href="/forgot-password.html" class="btn-secondary">
          <i class="ti ti-lock" aria-hidden="true"></i> Changer de mot de passe
        </a>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Abonnement</div>
      <div class="info-row"><span class="info-label">Offre actuelle</span><span class="info-value">${planBadge(user.plan)}</span></div>
      <div class="info-row"><span class="info-label">Statut</span><span class="info-value">${statusBadge(user.subscriptionStatus)}</span></div>
      ${hasPaid ? `<div class="info-row"><span class="info-label">Renouvellement</span><span class="info-value">${formatDate(user.periodEnd)}</span></div>` : ''}
      <div class="btn-row">
        ${hasPaid
          ? `<button id="btn-portal" class="btn-primary"><i class="ti ti-credit-card" aria-hidden="true"></i> Gérer ma facturation</button>
             <button id="btn-cancel-sub" class="btn-secondary" style="background:transparent;border:1px solid var(--border-default);color:var(--text-muted);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:all .2s;"><i class="ti ti-x" aria-hidden="true"></i> Annuler mon abonnement</button>`
          : `<a href="/tarifs.html" class="btn-primary"><i class="ti ti-bolt" aria-hidden="true"></i> Passer à l'offre payante</a>`
        }
      </div>
    </div>
  `;

  document.getElementById('page-title').textContent = `Bonjour, ${escHtml(user.firstName)} !`;

  // Score dashboard card (depuis localStorage)
  const scoreCard = buildScoreDashCard();
  if (scoreCard) grid.insertAdjacentHTML('afterbegin', scoreCard);

  // Tools card
  const toolsCard = buildToolsCard(user.plan);
  grid.insertAdjacentHTML('beforeend', toolsCard);
  // Déclenche les animations stagger après rendu
  requestAnimationFrame(() => grid.classList.add('rendered'));

  document.getElementById('btn-portal')?.addEventListener('click', async () => {
    const btn = document.getElementById('btn-portal');
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite" aria-hidden="true"></i> Chargement…';
    try {
      const res  = await fetch('/api/stripe/portal', { method:'POST', credentials:'include' });
      const data = await res.json();
      if (data.url) location.href = data.url;
    } catch { btn.disabled = false; btn.innerHTML = '<i class="ti ti-credit-card" aria-hidden="true"></i> Gérer ma facturation'; }
  });

  document.getElementById('btn-cancel-sub')?.addEventListener('click', async () => {
    if (!confirm('Annuler votre abonnement maintenant ? Votre accès sera supprimé immédiatement.')) return;
    const btn = document.getElementById('btn-cancel-sub');
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Annulation…';
    try {
      const res  = await fetch('/api/features', { method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ type:'cancel-sub' }) });
      const data = await res.json();
      if (data.ok) { location.reload(); }
      else { alert(data.error ?? 'Erreur'); btn.disabled = false; btn.innerHTML = '<i class="ti ti-x"></i> Annuler mon abonnement'; }
    } catch { btn.disabled = false; btn.innerHTML = '<i class="ti ti-x"></i> Annuler mon abonnement'; }
  });
}

async function init() {
  const params = new URLSearchParams(location.search);

  // Banner succès Stripe
  if (params.get('success') === '1') {
    document.getElementById('success-banner').style.display = 'flex';
    history.replaceState({}, '', '/profil.html');
  }

  // Modal onboarding après inscription
  if (params.get('welcome') === '1') {
    history.replaceState({}, '', '/profil.html');
    const overlay = document.createElement('div');
    overlay.className = 'onboard-overlay';
    overlay.innerHTML = `
      <div class="onboard-modal">
        <div style="font-size:36px;margin-bottom:12px">👋</div>
        <h2 style="font-size:22px;font-weight:900;letter-spacing:-0.04em;margin-bottom:8px">Bienvenue sur Prevano !</h2>
        <p style="font-size:14px;color:var(--text-muted);line-height:1.65">Voici comment tirer le maximum de ton compte en 3 étapes :</p>
        <div class="onboard-steps">
          <div class="onboard-step">
            <div class="onboard-step-num">1</div>
            <div class="onboard-step-body">
              <div class="onboard-step-title">Simule ta retraite</div>
              <div class="onboard-step-desc">Remplis les 5 champs du simulateur pour connaître ta pension estimée et ton score.</div>
            </div>
          </div>
          <div class="onboard-step">
            <div class="onboard-step-num">2</div>
            <div class="onboard-step-body">
              <div class="onboard-step-title">Découvre ton plan IA</div>
              <div class="onboard-step-desc">Le simulateur génère 1 action gratuite personnalisée — vois ce qui est possible.</div>
            </div>
          </div>
          <div class="onboard-step">
            <div class="onboard-step-num">3</div>
            <div class="onboard-step-body">
              <div class="onboard-step-title">Passe à l'action</div>
              <div class="onboard-step-desc">Débloque le plan complet avec une offre Prevano pour combler ton déficit de retraite.</div>
            </div>
          </div>
        </div>
        <a href="/" style="display:block;background:var(--color-primary);color:#fff;border-radius:10px;padding:14px;font-weight:700;font-size:15px;text-decoration:none;margin-bottom:10px;">
          Lancer ma simulation <i class="ti ti-arrow-right"></i>
        </a>
        <button onclick="this.closest('.onboard-overlay').remove()" style="background:none;border:none;color:var(--text-muted);font-size:13px;cursor:pointer;">
          Rester sur mon profil
        </button>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  }

  try {
    const expectingPlan = params.get('success') === '1';
    let user;

    // Polling : après un paiement réussi, le webhook Stripe met ~1-3s à mettre à jour la BDD.
    // On attend jusqu'à 12s que le plan passe de 'free' à payant avant de rendre le profil.
    if (expectingPlan) {
      const deadline = Date.now() + 12_000;
      while (Date.now() < deadline) {
        const r = await fetch('/api/auth/me', { credentials: 'include' });
        if (!r.ok) { location.replace('/login.html?next=/profil.html'); return; }
        const data = await r.json();
        if (data.user?.plan && data.user.plan !== 'free') { user = data.user; break; }
        await new Promise(ok => setTimeout(ok, 1500));
      }
      if (!user) {
        // Webhook toujours pas arrivé : on affiche quand même mais avec un message d'attente
        const r = await fetch('/api/auth/me', { credentials: 'include' });
        if (!r.ok) { location.replace('/login.html?next=/profil.html'); return; }
        user = (await r.json()).user;
        const banner = document.getElementById('success-banner');
        if (banner) banner.querySelector('span').textContent =
          'Paiement confirmé — activation de ton abonnement en cours… Actualise la page dans quelques secondes.';
      }
    } else {
      const res = await fetch('/api/auth/me', { credentials: 'include' });
      if (!res.ok) { location.replace('/login.html?next=/profil.html'); return; }
      user = (await res.json()).user;
    }

    renderProfile(user);
    // Historique DB (remplace localStorage si dispo)
    fetch('/api/features?t=sim-history', { credentials: 'include' })
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        if (!d?.history?.length) return;
        const el = document.getElementById('sim-history');
        if (!el) return;
        const TIERS = [{t:26,c:'#E24B4A',l:'Critique'},{t:51,c:'#CD7F32',l:'Bronze'},{t:71,c:'#B0B0C8',l:'Argent'},{t:91,c:'#FFB400',l:'Or'},{t:Infinity,c:'#22C55E',l:'Platine'}];
        const RATE  = {prive:{b:.35,e:.15,f:43},fonctionnaire:{b:.55,e:.20,f:41.5},independant:{b:.25,e:.10,f:43}};
        function calcScore(s) {
          const r=RATE[s.statut]??RATE.prive, ann=(s.dep||64)-s.age, p=Math.round(s.sal*(r.b+Math.min(ann/r.f,1)*r.e));
          let sc=Math.round((p/s.sal)*40)+Math.min(Math.round(((s.ep||0)/s.sal)*150),20)+Math.min(Math.round((ann/r.f)*25),25)+({prive:5,fonctionnaire:15,independant:0}[s.statut]??5);
          return Math.min(Math.max(sc,5),100);
        }
        if (d.history.length < 2) { el.innerHTML = ''; return; }
        const rows = d.history.map(({ data, created_at }) => {
          const s = typeof data === 'string' ? JSON.parse(data) : data;
          const sc = calcScore(s), tier = TIERS.find(t => sc < t.t);
          const date = created_at ? new Date(created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) : '';
          return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border-subtle);">
            <div style="font-size:22px;font-weight:900;color:${tier.c};min-width:38px;text-align:right">${sc}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:600;color:${tier.c}">${tier.l}</div>
              <div style="font-size:11px;color:var(--text-faint)">${date} · ${s.sal?s.sal.toLocaleString('fr-FR')+'€':''}</div>
            </div>
          </div>`;
        }).join('');
        el.innerHTML = `<div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border-subtle)">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin-bottom:12px">Historique</div>
          ${rows}
        </div>`;
      }).catch(() => {});
  } catch { location.replace('/login.html?next=/profil.html'); }
}

document.getElementById('btn-logout').addEventListener('click', async () => {
  await fetch('/api/auth/logout', { method:'POST', credentials:'include' });
  location.replace('/');
});

init();

// Animations reveal
const _revealObs = new IntersectionObserver(entries => {
  entries.forEach(({ target, isIntersecting }) => {
    if (isIntersecting) { target.style.opacity='1'; target.style.transform='none'; _revealObs.unobserve(target); }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.card,.tool-link,.upgrade-row').forEach(el => {
  el.style.cssText += 'opacity:0;transform:translateY(16px);transition:opacity .4s ease,transform .4s ease;';
  _revealObs.observe(el);
});
</script>

<script src="/gsap-animations.js"></script>
